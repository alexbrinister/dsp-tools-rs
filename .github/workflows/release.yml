name: Release

# Only trigger when a version tag like v0.1.0 is pushed
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # 1. Publish to crates.io first
  publish-crate:
    name: Publish to Crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # 2. Create GitHub Release
  create-release:
    name: Create GitHub Release
    needs: publish-crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: taiki-e/create-gh-release-action@v1
        with:
          # Mark as pre-release as requested
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # 3. Build and upload pre-compiled binaries for binstall
  upload-binaries:
    name: Build & Upload for ${{ matrix.target }}
    needs: create-release # Wait for release to be created
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Standard Linux Sysadmin target
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          # Standard macOS target
          - target: x86_64-apple-darwin
            os: macos-latest
          # Standard Windows target
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload Binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (optional) Tells the action to compress using tar.gz to match our binstall config
          archive: $bin-$target
          bin: dsp_tools
          target: ${{ matrix.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
